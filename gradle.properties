# JVM args for the Gradle daemon. 2 GB is comfortable for an app of this size.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use AndroidX (mandatory for the libraries in this project).
android.useAndroidX=true

# Kotlin code style for the official conventions.
kotlin.code.style=official

# Only package the resources actually referenced; keeps the APK lean.
android.nonTransitiveRClass=true

# Parallel + caching builds for faster local iteration.
org.gradle.parallel=true
org.gradle.caching=true
